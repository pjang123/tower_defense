# Bumped when a shipped default changes so existing servers pick up the new value once.
# (Bukkit never overwrites an existing config.yml, so the plugin migrates on enable.)
config-version: 1

# Global game settings
game:
  starting-gold: 150
  max-castle-health: 1000
  challenge-timeout-seconds: 30
  # Number of players required to fill a match queue and start a game.
  # Players are alternated between Blue (Arena 1) and Red (Arena 2) teams,
  # supporting up to 4v4 (8 players). Use /td forcestart to begin with fewer.
  players-per-match: 2

# Spells configuration (costs in gold, durations in seconds)
spells:
  overcharge:
    cost: 250
    duration: 10
  freeze:
    cost: 200
    duration: 10
    # 0.7 = mobs move at 70% speed (a 30% slow) while Freeze is active.
    slow-multiplier: 0.7
  damage-storm:
    cost: 300
    duration: 10
    damage-per-second: 2.0
  haste-rush:
    cost: 200
    duration: 6
    speed-multiplier: 1.2
  tower-emp:
    cost: 250
    duration: 6
  slow-shield:
    cost: 150
    duration: 5

# Passive gold generator & gear upgrades settings
upgrades:
  gold-gen:
    level1-income: 5
    level2-income: 20
    level3-income: 50
    level4-income: 100
    upgrade-costs:
      level2: 100
      level3: 300
      level4: 600
  sword:
    upgrade-costs:
      level2: 80
      level3: 200
      level4: 450
      level5: 900
  bow:
    upgrade-costs:
      level2: 150
      level3: 450

# Tower stats now live in towers.yaml
