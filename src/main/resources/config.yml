# Global game settings
game:
  starting-gold: 150
  max-castle-health: 100
  challenge-timeout-seconds: 30

# Spells configuration (costs in gold, durations in seconds)
spells:
  overcharge:
    cost: 250
    duration: 10
  freeze:
    cost: 200
    duration: 10
    slow-multiplier: 0.4
  damage-storm:
    cost: 300
    duration: 10
    damage-per-second: 2.0
  haste-rush:
    cost: 200
    duration: 6
    speed-multiplier: 1.2
  tower-emp:
    cost: 250
    duration: 6
  slow-shield:
    cost: 150
    duration: 5

# Passive gold generator & gear upgrades settings
upgrades:
  gold-gen:
    level1-income: 5
    level2-income: 20
    level3-income: 50
    level4-income: 100
    upgrade-costs:
      level2: 100
      level3: 300
      level4: 600
