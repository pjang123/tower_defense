# ===========================================================================
# Tower Defense — Wave Definitions (1-100)
#
# Each wave lists one or more "groups". A group spawns `count` mobs of an
# upgrade chain at a given `tier` (1-5), one every `interval` ticks, after an
# optional `delay` (ticks) from the start of the wave. 20 ticks = 1 second.
#
# `mob` is a raw CSV upgrade-chain key from mob_upgrades_polymorphic.csv:
#   zombie, spider, skeleton, creeper, silverfish, blaze, "zombie pigman",
#   witch, slime, giant, warden, ravager, hoglin, enderman, endermite,
#   breeze, evoker, vex
#
# Difficulty ramps from trivial (wave 1) to extreme (wave 100). Bosses and
# heavies headline milestone (multiple-of-5/10) waves; support casters
# (witch heals, evoker shields) escort swarms once introduced.
# ===========================================================================
