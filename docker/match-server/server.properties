# Tower Defense ephemeral match server.
# Player auth is delegated to the Velocity proxy, so the match server runs offline-mode.
# (Modern secret-based Velocity forwarding additionally needs proxies.velocity in
#  config/paper-global.yml + a shared forwarding secret — see README, that's Phase 3.)
online-mode=false
prevent-proxy-connections=false

# The plugin builds the real match world from GAME_WORLD_TEMPLATES at runtime, so keep
# the bootstrap world tiny to minimise container start-up time.
level-name=world
level-type=minecraft:flat
generate-structures=false
spawn-npcs=false
spawn-animals=false
spawn-monsters=false

view-distance=6
simulation-distance=6
max-players=8
server-port=25565
motd=Tower Defense Match Server
